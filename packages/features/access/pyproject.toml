[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cqrs-ddd-access-control"
version = "0.1.0"
description = "Authorization for CQRS-DDD applications — RBAC, ABAC, ACL, ownership, single-query auth, and undo support"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [
    { name = "Myron Gourlis", email = "myrgourlis@gmail.com" }
]
dependencies = [
    "cqrs-ddd-core",
    "cqrs-ddd-identity",
]

[project.optional-dependencies]
specifications = [
    "cqrs-ddd-specifications",
]
advanced = [
    "cqrs-ddd-advanced-core",
]
redis = [
    "cqrs-ddd-redis",
]
stateful-abac = [
    "stateful-abac-sdk @ git+https://github.com/mgourlis/stateful-abac-policy-engine.git#subdirectory=python-sdk",
]
opa = [
    "httpx>=0.24.0",
]
casbin = [
    "casbin>=1.30.0",
]
all = [
    "cqrs-ddd-access-control[specifications,advanced,redis]",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["cqrs_ddd_access_control*"]
